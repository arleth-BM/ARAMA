<body>

    <!-- ===== HEADER - IGUAL AL INDEX ===== -->
    <header class="bg-arama-verde text-white shadow-lg sticky top-0 z-50">

                <nav class="flex gap-3 md:gap-4 text-xs md:text-sm">

                </div>

            <!-- Bouquet -->

                <img src="img/centro3.jpeg" alt="Centro 3" onclick="openModal(this.src)">

                <img src="img/evento5.jpeg" alt="Evento 5" onclick="openModal(this.src)">
                <img src="img/evento6.jpeg" alt="Evento 6" onclick="openModal(this.src)">
                <img src="img/evento7.jpeg" alt="Evento 7" onclick="openModal(this.src)">

                <img src="img/evento9.jpeg" alt="Evento 9" onclick="openModal(this.src)">

    <!-- ===== MODAL PARA IMÁGENES ===== -->
    <div id="imageModal" class="modal" onclick="closeModal()">
        <span class="close" onclick="closeModal()">&times;</span>
        <img id="modalImage" src="" alt="Imagen ampliada">
    </div>

    <!-- ===== FOOTER ===== -->
    <footer class="bg-arama-verde text-white mt-8 md:mt-12 py-4 md:py-6">
        <div class="container mx-auto px-3 md:px-4 text-center text-xs md:text-sm">
            <p><i class="fas fa-seedling text-arama-dorado"></i> ARAMA Florería - Todos los derechos reservados</p>
        </div>
    </footer>

    <!-- ===== JAVASCRIPT ===== -->
    <script>
        function openModal(src) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            modal.classList.add('active');
            modalImg.src = src;
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('imageModal');
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
    </script>

</body>
</html>
